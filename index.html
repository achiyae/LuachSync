<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hebrew Calendar for Google Calendar</title>
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing.
      (function () {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var base = window.location.pathname.replace(/\/$/, '');
          var query = params.get('q') ? '?' + params.get('q').replace(/~and~/g, '&') : '';
          window.history.replaceState(null, '', base + '/' + p + query + window.location.hash);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
