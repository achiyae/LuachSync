<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>HC4GC</title>
    <script>
      // GitHub Pages SPA routing trick.
      // Encodes the sub-path as a query param and redirects to index.html so
      // the React app can restore the correct route via history.replaceState.
      // Base segment count = 1  (the repo name: /HebrewCalendar/)
      var segmentCount = 1;
      var l = window.location;
      var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
      var subPath = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.host + base + '/?p=' +
        subPath.replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
